name: Gold price check

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gold-price-check
  cancel-in-progress: false

jobs:
  run_gold_price_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.11.0

      - name: Install dependencies
        run: dart pub get

      - name: Check prices & notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: dart run bin/check_gold_prices.dart --config-path config/goldbot.json

      - name: Update README from snapshot
        run: dart run bin/update_readme_snapshot.dart --snapshot-path data/last_snapshot.json --readme-path README.md

      - name: Commit data changes
        shell: bash
        run: |
          set -euo pipefail
          FILES=("data/last_snapshot.json" "data/subscribers.json" "data/telegram_offset.json" "README.md")
          if [ -z "$(git status --porcelain -- "${FILES[@]}" 2>/dev/null || true)" ]; then
            echo "No data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              git add -- "$f"
            fi
          done

          git commit -m "chore: update gold price snapshot/subscribers" || true
          git push || true
